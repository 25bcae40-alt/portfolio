name: CI/CD
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    name: CI (build + smoke checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke test (import app + init db)
        run: |
          python -c "from server import app; assert app is not None; print('app import ok')"
          python -c "from backend.database import init_db; init_db(); print('db init ok')"
  cd:
    name: CD (trigger Render deploy)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook (optional)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set; skipping deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
